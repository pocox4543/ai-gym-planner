<!DOCTYPE html>
<html>
<head>
  <title>AI Gym Planner</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LEFT SIDE -->
<div class="side left">
  <div class="binary" id="binary"></div>
  <div class="icon dumbbell">💪</div>
</div>

<!-- MAIN APP -->
<div class="container">
  <h1>💪 AI Gym + Diet Planner</h1>

  <label>Weight (kg)</label>
  <input type="number" id="weight" placeholder="Enter your weight">

  <label>Goal</label>
  <select id="goal">
    <option>Bulking</option>
    <option>Fat Loss</option>
  </select>

  <label>Diet Type</label>
  <select id="diet">
    <option>Vegetarian</option>
    <option>Vegan</option>
    <option>Lactose Free</option>
  </select>

  <button onclick="generatePlan()">Generate Plan 🚀</button>

  <div id="result" class="result"></div>
</div>

<!-- RIGHT SIDE -->
<div class="side right">
  <div class="icon racket">🏸</div>
</div>

<script src="script.js"></script>
</body>
</html>
